<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE NODE | MODIFY ENTITY</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #162423; color: #9cd1d1; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .edit-box { background-color: #1a2b2a; padding: 40px; border: 1px solid #2a4040; border-radius: 8px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f0c674; margin-top: 0; margin-bottom: 30px; border-bottom: 1px dashed #2a4040; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #6a9c9c; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; background-color: #162423; border: 1px solid #2a4040; color: #9cd1d1; font-family: inherit; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #9cd1d1; }
        .btn-group { display: flex; gap: 10px; }
        button, .btn-cancel { flex: 1; padding: 12px; font-weight: bold; font-family: inherit; cursor: pointer; border-radius: 4px; text-align: center; text-decoration: none; border: none;}
        button { background-color: #9cd1d1; color: #162423; }
        button:hover { background-color: #b0e0e0; }
        .btn-cancel { background-color: transparent; border: 1px solid #6a9c9c; color: #6a9c9c; }
        .btn-cancel:hover { background-color: rgba(106, 156, 156, 0.1); }
        .msg { margin-bottom: 15px; font-size: 0.9em; padding: 10px; background-color: #111c1b; border: 1px solid #2a4040;}
        .msg-success { color: #9cd1d1; }
        .msg-error { color: #eb8282; }
    </style>
</head>
<body>
    <div class="nav-back-home" style="position: absolute; top: 20px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 9999;">
        <a href="javascript:history.back()" title="Back" style="color: #eb8282; text-decoration: none; display: flex; align-items: center; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <a href="/" title="Home" style="color: #eb8282; text-decoration: none; display: flex; align-items: center; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
    </div>
    <div class="edit-box">
        <h2>MODIFY ENTITY</h2>
        {% if msg %}<div class="msg {% if msg_color == '#eb8282' %}msg-error{% else %}msg-success{% endif %}">{{ msg }}</div>{% endif %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>IDENTITY (Must be @gmail.com)</label>
            <input type="text" name="edit_email" value="{{ email }}" required autocomplete="off">
            
            <label>PASSPHRASE</label>
            <input type="password" name="edit_password" placeholder="Leave blank to retain current key">
            
            <label>CLEARANCE LEVEL</label>
            <select name="edit_role">
                <option value="Standard" {% if data.role == 'Standard' %}selected{% endif %}>Standard</option>
                {% if session.role == 'Superadmin' or data.role == 'Admin' %}
                <option value="Admin" {% if data.role == 'Admin' %}selected{% endif %}>Admin</option>
                {% endif %}
                {% if data.role == 'Superadmin' %}
                <option value="Superadmin" selected>Superadmin</option>
                {% endif %}
            </select>
            
            <div class="btn-group">
                <a href="/admin" class="btn-cancel">ABORT</a>
                <button type="submit">COMMIT CHANGES</button>
            </div>
        </form>
    </div>
</body>
</html>
