<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE NODE | AUTH</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #162423; color: #9cd1d1; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #1a2b2a; padding: 40px; border: 1px solid #2a4040; border-radius: 8px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1;}
        h2 { color: #eb8282; margin-top: 0; margin-bottom: 30px; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background-color: #162423; border: 1px solid #2a4040; color: #9cd1d1; font-family: inherit; box-sizing: border-box; }
        input:focus { outline: none; border-color: #9cd1d1; }
        button { width: 100%; padding: 12px; background-color: #eb8282; color: #162423; border: none; font-weight: bold; font-family: inherit; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #ff9999; }
        .error { color: #ff6666; font-size: 0.85em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>SYS.LOGIN</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="email" placeholder="EMAIL ADDRESS" required autocomplete="off">
            <input type="password" name="password" placeholder="PASSPHRASE" required>
            <button type="submit">AUTHENTICATE</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </div>
</body>
</html>
