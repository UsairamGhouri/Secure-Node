<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE NODE | FORGOT PASSWORD</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #162423; color: #9cd1d1; font-family: 'Fira Code', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reset-box { background-color: #1a2b2a; padding: 40px; border: 1px solid #2a4040; border-radius: 8px; width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #eb8282; margin-top: 0; margin-bottom: 20px; letter-spacing: 1px; font-size: 1.4em; }
        p { color: #6a9c9c; font-size: 0.85em; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background-color: #162423; border: 1px solid #2a4040; color: #9cd1d1; font-family: inherit; box-sizing: border-box; }
        input:focus { outline: none; border-color: #9cd1d1; }
        button { width: 100%; padding: 12px; background-color: #eb8282; color: #162423; border: none; font-weight: bold; font-family: inherit; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #ff9999; }
        .error { color: #ff6666; font-size: 0.85em; margin-top: 15px; }
        .back-link { display: block; margin-top: 20px; font-size: 0.8em; color: #6a9c9c; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nav-back-home" style="position: absolute; top: 20px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 9999;">
        <a href="javascript:history.back()" title="Back" style="color: #eb8282; text-decoration: none; display: flex; align-items: center; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <a href="/" title="Home" style="color: #eb8282; text-decoration: none; display: flex; align-items: center; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
    </div>
    <div class="reset-box">
        <h2>RESET PASSWORD</h2>
        <p>Enter your registered email address below. A 6-digit verification code will be sent to authorize the password reset.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="email" placeholder="EMAIL ADDRESS (@gmail.com)" required autocomplete="off">
            <button type="submit">SEND RESET CODE</button>
        </form>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <a href="{{ url_for('login') }}" class="back-link">← Cancel and Back to Login</a>
    </div>
</body>
</html>
